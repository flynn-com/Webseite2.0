<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content-Manager &ndash; Flynn Bertsch</title>
    <!-- GitHub-Token-Interceptor — muss VOR dem Decap-Script stehen -->
    <script>
      (function () {
        var _orig = window.fetch;
        window.fetch = function (url, opts) {
          try {
            var urlStr = typeof url === 'string' ? url
                       : (url && typeof url.url === 'string' ? url.url : '');
            if (!window._ghToken && urlStr.indexOf('api.github.com') !== -1) {
              var hdrs = (opts && opts.headers) || {};
              var auth = typeof hdrs.get === 'function'
                ? (hdrs.get('Authorization') || hdrs.get('authorization') || '')
                : (hdrs['Authorization'] || hdrs['authorization'] || '');
              if (!auth && url && url.headers) {
                var rh = url.headers;
                auth = typeof rh.get === 'function'
                  ? (rh.get('Authorization') || rh.get('authorization') || '')
                  : (rh['Authorization'] || rh['authorization'] || '');
              }
              if (auth.indexOf('token ') === 0)  window._ghToken = auth.slice(6);
              else if (auth.indexOf('Bearer ') === 0) window._ghToken = auth.slice(7);
            }
          } catch (_) {}
          return _orig.apply(this, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <!-- Decap CMS 3.x -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Live-Vorschau + Custom Widgets -->
    <script src="/admin/preview.js"></script>

    <!-- AVIF-Fix: patcht file-inputs damit AVIF-Dateien im Dateiauswahl-Dialog sichtbar sind -->
    <script>
      (function () {
        function patchInput(input) {
          if (input.tagName !== 'INPUT' || input.type !== 'file') return;
          var accept = input.getAttribute('accept') || '';
          if (!accept.includes('.avif')) {
            input.setAttribute('accept',
              accept ? accept + ',.avif,image/avif' : '.avif,image/avif,image/*');
          }
        }

        // Bereits vorhandene inputs patchen
        document.querySelectorAll('input[type="file"]').forEach(patchInput);

        // Zukünftige inputs beobachten (Decap rendert React dynamisch)
        new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (node) {
              if (!node.querySelectorAll) return;
              node.querySelectorAll('input[type="file"]').forEach(patchInput);
              if (node.tagName === 'INPUT') patchInput(node);
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
