# ----------------------------------------------------------------------------------
# Decap CMS Konfiguration
# ----------------------------------------------------------------------------------

backend:
  name: github
  repo: flynn-com/Webseite2.0
  branch: main
  base_url: https://portfolio-oauth.flynn-fdc.workers.dev
  auth_endpoint: /auth

publish_mode: simple

# Medien global — alle Projekt-Uploads in einem Ordner
media_folder: "public/uploads/projekte"
public_folder: "/uploads/projekte"

# Anzeige im CMS
site_url: "https://flynnbertsch.com"
display_url: "https://flynnbertsch.com"
locale: "de"

collections:

  # ──────────────────────────────────────────
  # EINSTELLUNGEN
  # ──────────────────────────────────────────
  - name: "settings"
    label: "Einstellungen"
    files:

      - name: "page_routes"
        label: "Seiten-URLs"
        file: "src/data/page-routes.json"
        format: json
        editor:
          preview: false
        fields:
          - name: "de"
            label: "Deutsch — URL-Slugs"
            widget: "object"
            hint: "Nur Kleinbuchstaben, Zahlen und Bindestriche. Kein / davor oder danach."
            fields:
              - { name: "about",    label: "Über-mich-Seite",    widget: "string", default: "ueber-mich",  hint: "z.B. ueber-mich oder flynn" }
              - { name: "projects", label: "Projekte-Übersicht",  widget: "string", default: "projekte",    hint: "z.B. projekte oder portfolio" }
              - { name: "imprint",  label: "Impressum",           widget: "string", default: "impressum" }
              - { name: "privacy",  label: "Datenschutz",         widget: "string", default: "datenschutz" }
              - { name: "contact",  label: "Kontakt",             widget: "string", default: "kontakt" }
          - name: "en"
            label: "Englisch — URL-Slugs"
            widget: "object"
            hint: "Lowercase letters, numbers and hyphens only."
            fields:
              - { name: "about",    label: "About page",     widget: "string", default: "about" }
              - { name: "projects", label: "Projects index",  widget: "string", default: "projects" }
              - { name: "imprint",  label: "Imprint",         widget: "string", default: "imprint" }
              - { name: "privacy",  label: "Privacy",         widget: "string", default: "privacy" }
              - { name: "contact",  label: "Contact",         widget: "string", default: "contact" }

  # ──────────────────────────────────────────
  # SEITENINHALTE (Singleton-Dateien)
  # ──────────────────────────────────────────
  - name: "pages"
    label: "Seiteninhalte"
    files:

      - name: "about_de"
        label: "Über mich (Deutsch)"
        file: "src/content/about/de.md"
        media_folder: "/public/uploads/about"
        public_folder: "/uploads/about"
        editor:
          preview: false
        fields:
          - name: "photo"
            label: "Profilbild"
            widget: "image"
            hint: "Portrait-Format empfohlen (2:3). AVIF oder JPG, max. 5 MB."
          - name: "photo_focal"
            label: "Profilbild — Fokuspunkt"
            widget: "focal-picker"
            required: false
            default: "50% 50%"
            image_field: "photo"
            hint: "Klicke auf das Bild um den Fokuspunkt zu setzen"
          - name: "subtitle"
            label: "Berufsbezeichnung (erscheint unter dem Namen)"
            widget: "string"
            default: "Fotograf & Videograf & Designer"
          - name: "skills"
            label: "Skills (schwarze Pill-Buttons)"
            widget: "list"
            required: false
            hint: "Z.B. Fotografie, Videografie, Design, Webdesign — jeder Eintrag wird ein Pill"
            field: { name: "skill", label: "Skill", widget: "string" }
          - name: "body"
            label: "Über-mich-Text"
            widget: "markdown"
            hint: "Dieser Text erscheint neben dem Foto. 3–5 kurze Absätze empfohlen."

      - name: "contact_de"
        label: "Kontaktseite (Deutsch)"
        file: "src/content/contact/de.md"
        editor:
          preview: false
        fields:
          - name: "subtitle"
            label: "Untertitel (unter dem Heading)"
            widget: "string"
            default: "Lass uns zusammenarbeiten."
            hint: "z.B. 'Lass uns zusammenarbeiten.' oder 'Ich freue mich auf deine Nachricht.'"
          - name: "email"
            label: "E-Mail-Adresse"
            widget: "string"
            hint: "Wird als anklickbarer Link angezeigt"
          - name: "links"
            label: "Links (Social Media, Website, …)"
            widget: "list"
            required: false
            hint: "Jeder Eintrag erscheint als Link mit ↗ am Ende"
            summary: "{{fields.label}}"
            fields:
              - { name: "label", label: "Bezeichnung", widget: "string", hint: "z.B. Instagram, LinkedIn, Behance" }
              - { name: "url",   label: "URL",          widget: "string", hint: "Vollständige URL inkl. https://" }

      - name: "contact_en"
        label: "Contact page (English)"
        file: "src/content/contact/en.md"
        editor:
          preview: false
        fields:
          - name: "subtitle"
            label: "Subtitle (below heading)"
            widget: "string"
            default: "Let's work together."
          - name: "email"
            label: "Email address"
            widget: "string"
          - name: "links"
            label: "Links (social media, website, …)"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - { name: "label", label: "Label", widget: "string" }
              - { name: "url",   label: "URL",   widget: "string" }

      # ── IMPRESSUM ──
      - name: "imprint_de"
        label: "Impressum (Deutsch)"
        file: "src/content/imprint/de.md"
        editor:
          preview: false
        fields:
          - name: "body"
            label: "Impressum-Text"
            widget: "markdown"
            hint: "## für Abschnittsüberschriften verwenden, darunter normaler Text."

      - name: "imprint_en"
        label: "Imprint (English)"
        file: "src/content/imprint/en.md"
        editor:
          preview: false
        fields:
          - name: "body"
            label: "Imprint text"
            widget: "markdown"
            hint: "Use ## for section headings, followed by regular text."

      # ── DATENSCHUTZ ──
      - name: "privacy_de"
        label: "Datenschutzerklärung (Deutsch)"
        file: "src/content/privacy/de.md"
        editor:
          preview: false
        fields:
          - name: "body"
            label: "Datenschutz-Text"
            widget: "markdown"
            hint: "## für Abschnittsüberschriften verwenden, darunter normaler Text."

      - name: "privacy_en"
        label: "Privacy policy (English)"
        file: "src/content/privacy/en.md"
        editor:
          preview: false
        fields:
          - name: "body"
            label: "Privacy policy text"
            widget: "markdown"
            hint: "Use ## for section headings, followed by regular text."

  # ──────────────────────────────────────────
  # PROJEKTE
  # ──────────────────────────────────────────

  # ---------------- DEUTSCH ----------------
  - name: "projects_de"
    label: "Projekte (Deutsch)"
    folder: "src/content/projects/de"
    create: true
    slug: "{{slug}}"
    preview_path: "projekte/{{slug}}"
    media_folder: "public/uploads/projekte/{{slug}}"
    public_folder: "/uploads/projekte/{{slug}}"
    editor:
      preview: true
    fields:
      - { name: "title", label: "Titel", widget: "string" }
      - { name: "slug", label: "URL-Slug (ohne Leerzeichen)", widget: "string", hint: "Erscheint in der URL, z.B. 'portrait-studio'" }
      - name: "category"
        label: "Kategorie"
        widget: "select"
        options:
          - { label: "Fotografie", value: "fotografie" }
          - { label: "Video", value: "video" }
          - { label: "Webdesign", value: "webdesign" }
          - { label: "Design", value: "design" }
      - { name: "order", label: "Reihenfolge auf der Startseite", widget: "number", default: 99, value_type: "int", min: 1, hint: "1 = ganz oben, 2 = zweite Position usw." }
      - name: "cover"
        label: "Titelbild (erscheint immer als erstes im Karussell)"
        widget: "image"
        hint: "Empfohlen: AVIF, 2400px, Qualität 80%"
      - name: "cover_focal"
        label: "Titelbild — Fokuspunkt"
        widget: "focal-picker"
        required: false
        default: "50% 50%"
        image_field: "cover"
        hint: "Klicke auf das Bild um den Fokuspunkt zu setzen"
      - { name: "description", label: "Kurzbeschreibung (1-2 Sätze)", widget: "text", required: false }
      - { name: "location", label: "Ort / Stadt", widget: "string", required: false, hint: "z.B. München, Stuttgart — erscheint im Glas-Panel" }
      - name: "gallery"
        label: "Weitere Bilder"
        widget: "list"
        required: false
        hint: "Bilder einzeln hinzufügen · Reihenfolge per Drag-and-Drop ändern"
        fields:
          - { name: "image", label: "Bild", widget: "image" }
          - name: "focal"
            label: "Fokuspunkt"
            widget: "focal-picker"
            required: false
            default: "50% 50%"
            image_field: "image"
            hint: "Klicke auf das Bild um den Fokuspunkt zu setzen"
      - name: "youtube"
        label: "YouTube-Links"
        widget: "list"
        required: false
        summary: "{{fields.url}}"
        field: { name: "url", label: "YouTube-URL", widget: "string", pattern: ['^https?://(www\.)?(youtube\.com|youtu\.be)/.+', 'Bitte eine gültige YouTube-URL eingeben'] }
      - name: "videos"
        label: "Eigene Videos Querformat (16:9, max. 20 MB, MP4)"
        hint: "Größere Videos bitte als YouTube-Link einbinden"
        widget: "list"
        required: false
        field: { name: "file", label: "Videodatei", widget: "file", allow_multiple: true }
      - name: "videos_portrait"
        label: "Eigene Videos Hochkant (9:16, max. 20 MB, MP4)"
        hint: "Reels, TikToks, vertikale Clips — werden im Raster als Hochkant-Slot angezeigt"
        widget: "list"
        required: false
        field: { name: "file", label: "Videodatei", widget: "file", allow_multiple: true }
      - name: "tags"
        label: "Tags"
        widget: "list"
        required: false
        field: { name: "tag", label: "Tag", widget: "string" }
      - { name: "featured", label: "Auf Startseite anzeigen", widget: "boolean", default: true }
      - { name: "draft", label: "Entwurf (nicht veröffentlichen)", widget: "boolean", default: false }
      - { name: "body", label: "Fließtext (Markdown)", widget: "markdown", required: false }

  # ---------------- ENGLISCH ----------------
  - name: "projects_en"
    label: "Projects (English)"
    folder: "src/content/projects/en"
    create: true
    slug: "{{slug}}"
    preview_path: "en/projects/{{slug}}"
    media_folder: "public/uploads/projekte/{{slug}}"
    public_folder: "/uploads/projekte/{{slug}}"
    editor:
      preview: true
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "slug", label: "URL slug", widget: "string" }
      - name: "category"
        label: "Category"
        widget: "select"
        options:
          - { label: "Photography", value: "fotografie" }
          - { label: "Video", value: "video" }
          - { label: "Web design", value: "webdesign" }
          - { label: "Design", value: "design" }
      - { name: "order", label: "Order on homepage", widget: "number", default: 99, value_type: "int", min: 1, hint: "1 = first, 2 = second, etc." }
      - name: "cover"
        label: "Cover image (always shown first in carousel)"
        widget: "image"
        hint: "Recommended: AVIF, 2400px, quality 80%"
      - name: "cover_focal"
        label: "Cover image — focal point"
        widget: "focal-picker"
        required: false
        default: "50% 50%"
        image_field: "cover"
        hint: "Click on the image to set the focal point"
      - { name: "description", label: "Short description", widget: "text", required: false }
      - { name: "location", label: "Location / City", widget: "string", required: false, hint: "e.g. Munich, Stuttgart — shown in the glass panel" }
      - name: "gallery"
        label: "Additional images"
        widget: "list"
        required: false
        hint: "Add images one by one · drag to reorder"
        fields:
          - { name: "image", label: "Image", widget: "image" }
          - name: "focal"
            label: "Focal point"
            widget: "focal-picker"
            required: false
            default: "50% 50%"
            image_field: "image"
            hint: "Click on the image to set the focal point"
      - name: "youtube"
        label: "YouTube links"
        widget: "list"
        required: false
        field: { name: "url", label: "YouTube URL", widget: "string" }
      - name: "videos"
        label: "Local videos landscape (16:9, max 20 MB, MP4)"
        widget: "list"
        required: false
        field: { name: "file", label: "Video file", widget: "file", allow_multiple: true }
      - name: "videos_portrait"
        label: "Local videos portrait (9:16, max 20 MB, MP4)"
        hint: "Reels, TikToks, vertical clips — displayed as portrait slot in the grid"
        widget: "list"
        required: false
        field: { name: "file", label: "Video file", widget: "file", allow_multiple: true }
      - name: "tags"
        label: "Tags"
        widget: "list"
        required: false
        field: { name: "tag", label: "Tag", widget: "string" }
      - { name: "featured", label: "Show on homepage", widget: "boolean", default: true }
      - { name: "draft", label: "Draft (do not publish)", widget: "boolean", default: false }
      - { name: "body", label: "Body (Markdown)", widget: "markdown", required: false }
